<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titulo del Artículo - Ocaso Escarlata</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/article.css">
    <link rel="icon" href="/img/favicon.png" type="image/png">
</head>
<body>
    <!-- Barra de Progreso -->
    <div class="progress-bar-container">
        <div class="progress-bar-fill" id="progressBar"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light border-bottom" id="navbar-container"></nav>

    <!-- Main Content -->
    <main class="article-main">
        <div class="container article-container">
            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb breadcrumb-article">
                    <li class="breadcrumb-item"><a href="index.html">Inicio</a></li>
                    <li class="breadcrumb-item active">Título del Artículo</li>
                </ol>
            </nav>

            <div class="row">
                <!-- Tabla de Contenidos (Sidebar) -->
                <aside class="col-lg-3 d-none d-lg-block">
                    <div class="table-of-contents">
                        <h5 class="toc-title">Contenido</h5>
                        <nav id="toc-nav" class="toc-nav">
                            <!-- Se genera automáticamente desde h2 y h3 -->
                        </nav>
                    </div>
                </aside>

                <!-- Contenido Principal -->
                <article class="col-lg-9">
                    <!-- Header del Artículo -->
                    <header class="article-header mb-5">
                        <h1 class="article-title">Título del Artículo</h1>
                        
                        <div class="article-metadata">
                            <div class="metadata-item">
                                <span class="metadata-label">Autor:</span>
                                <span class="metadata-value">Nombre del Autor</span>
                            </div>
                            <div class="metadata-item">
                                <span class="metadata-label">Publicado:</span>
                                <span class="metadata-value">11 de abril de 2024</span>
                            </div>
                            <div class="metadata-item">
                                <span class="metadata-label">Tiempo de lectura:</span>
                                <span class="metadata-value" id="readingTime">5 minutos</span>
                            </div>
                        </div>

                        <div class="article-tags">
                            <span class="tag-badge">Etiqueta 1</span>
                            <span class="tag-badge">Etiqueta 2</span>
                            <span class="tag-badge">Etiqueta 3</span>
                        </div>
                    </header>

                    <!-- Contenido del Artículo -->
                    <div class="article-content">
                        <!-- ============================================
                             INICIO DEL CONTENIDO EDITABLE
                             ============================================ -->


                        <!-- ============================================
                             FIN DEL CONTENIDO EDITABLE
                             ============================================ -->
                    </div>

                    <!-- Sección de Autor -->
                    <div class="author-section">
                        <h3>Sobre el Autor</h3>
                        <div class="author-bio">
                            <p>Breve biografía del autor. Puedes incluir credenciales y link a redes sociales.</p>
                        </div>
                    </div>
                </article>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer id="footer-container"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/article-base.js"></script>
    <script src="../js/footer.js"></script>
</body>
</html>
